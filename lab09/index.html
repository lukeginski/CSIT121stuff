<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reads the XML data using JavaScript</title>

    <!-- CSS -->
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            text-align: left;
            padding: 8px;
        }

        tr:nth-child(even) {
            background-color: #7ce2af
        }

        th {
            background-color: #7c0f65;
            color: white;
        }

        .button {
            position: relative;
            text-align: center;
            padding: 20px;
            border: 4px solid rgb(55, 12, 211);
            background: rgba(20, 192, 4, 0.5);
            color: rgb(230, 36, 78);
            outline: none;
            border-radius: 30px;
            font-size: 30px;
            width: 500px;
            display: block;
            margin: 0 auto;

        }

        .button:hover {
            color: black;
            background: white;
        }
    </style>

    <!--JavaScript-->
    <script>
    var tableVisible = false;

    function toggleTable() {
        var table = document.getElementById("id");
        if (tableVisible == false) {
            loadXMLDoc();
            table.style.display = "block";
            document.getElementById("btn").innerHTML = "Close Employee Data";
            tableVisible = true;
        } else {
            table.style.display = "none";
            document.getElementById("btn").innerHTML = "Get Employee Data";
            tableVisible = false;
        }
    }

    function loadXMLDoc() {
        let xmlhttp = new XMLHttpRequest();
        xmlhttp.onreadystatechange = function() {
            if (this.readyState == 4 && this.status == 200) {
                empDetails(this);
            }
        };
        xmlhttp.open("GET", "employee.xml", true);
        xmlhttp.send();
    }

    function empDetails(xml) {
        let i;
        let xmlDoc = xml.responseXML;
        let table = `<tr><th>Firstname</th><th>Lastname</th>
            <th>Title</th><th>Division</th>
            <th>Building</th><th>Room</th>
        </tr>`;
        let x = xmlDoc.getElementsByTagName("employee");

        for (i = 0; i < x.length; i++) {
            table += "<tr><td>" +
                x[i].getElementsByTagName("firstname")[0].childNodes[0].nodeValue + "</td><td>" +
                x[i].getElementsByTagName("lastname")[0].childNodes[0].nodeValue + "</td><td>" +
                x[i].getElementsByTagName("title")[0].childNodes[0].nodeValue + "</td><td>" +
                x[i].getElementsByTagName("division")[0].childNodes[0].nodeValue + "</td><td>" +
                x[i].getElementsByTagName("building")[0].childNodes[0].nodeValue + "</td><td>" +
                x[i].getElementsByTagName("room")[0].childNodes[0].nodeValue + "</td></tr>";
        }

        document.getElementById("id").innerHTML = table;
    }
</script>
</head>

<body>
    <button type="button" id="btn" class="button" onclick="toggleTable()">
    Get Employee Data
    </button>

    <br><br>
    <table id="id" style="display:none;"></table>
</body>

<p>The toggle button was created with help from Claude AI. Claude added a toggleTable() function that shows and hides the table and updates the button text based on its current state.</p>

</html>
