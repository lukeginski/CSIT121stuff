<!DOCTYPE html>
<head>
    <title>Reads the XML data using JavaScript</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            text-align: left;
            padding: 8px;
        }
        tr:nth-child(even) {
            background-color: #7ce2af;
        }
        th {
            background-color: #7c0f65;
            color: white;
        }
        .button {
            position: relative;
            text-align: center;
            padding: 20px;
            border: 4px solid rgb(55, 12, 211);
            background: rgba(20, 192, 4, 0.5);
            color: rgb(230, 36, 78);
            outline: none;
            border-radius: 30px;
            font-size: 30px;
            width: 500px;
        }
        .button:hover {
            color: black;
            background: white;
        }
    </style>
    <script>
        /*
         * AI-ASSISTED CODE — Toggle Feature
         * Generated with Claude (Anthropic) on 2026-04-27
         *
         * Prompt given to AI:
         * "Update the code to allow the button to toggle the table off and on.
         *  The button text should display 'Get Employee Data' or 'Close Employee Data'
         *  depending on its current state."
         *
         * What the AI added/changed:
         * 1. Added a boolean variable `tableVisible` to track whether the table is shown.
         * 2. Renamed the function to `toggleEmployeeData()` to reflect its new toggle behavior.
         * 3. On first click (or when hidden): loads XML and displays the table, updates button text.
         * 4. On subsequent clicks (when visible): clears the table and resets button text.
         * 5. XML loading logic and empDetails() function remain unchanged from original.
         */

        // Tracks whether the table is currently displayed (AI-added)
        let tableVisible = false;

        // AI-modified: was loadXMLDoc(), now handles both show and hide behavior
        function toggleEmployeeData() {
            let btn = document.getElementById("toggleBtn");

            if (tableVisible) {
                // Table is visible — hide it and reset (AI-added block)
                document.getElementById("id").innerHTML = "";
                btn.textContent = "Get Employee Data";
                tableVisible = false;
            } else {
                // Table is hidden — fetch XML and display it (AI-added block)
                let xmlhttp = new XMLHttpRequest();
                xmlhttp.onreadystatechange = function() {
                    if (this.readyState == 4 && this.status == 200) {
                        empDetails(this);
                        // Update button text after data loads (AI-added)
                        btn.textContent = "Close Employee Data";
                        tableVisible = true;
                    }
                };
                xmlhttp.open("GET", "employee.xml", true);
                xmlhttp.send();
            }
        }

        // Original function — unchanged except it is now called from toggleEmployeeData()
        function empDetails(xml) {
            let i;
            let xmlDoc = xml.responseXML;
            let table = `<tr><th>Firstname</th><th>Lastname</th>
                <th>Title</th><th>Division</th>
                <th>Building</th><th>Room</th>
            </tr>`;
            let x = xmlDoc.getElementsByTagName("employee");
            for (i = 0; i < x.length; i++) {
                table += "<tr><td>" +
                    x[i].getElementsByTagName("firstname")[0].childNodes[0].nodeValue + "</td><td>" +
                    x[i].getElementsByTagName("lastname")[0].childNodes[0].nodeValue + "</td><td>" +
                    x[i].getElementsByTagName("title")[0].childNodes[0].nodeValue + "</td><td>" +
                    x[i].getElementsByTagName("division")[0].childNodes[0].nodeValue + "</td><td>" +
                    x[i].getElementsByTagName("building")[0].childNodes[0].nodeValue + "</td><td>" +
                    x[i].getElementsByTagName("room")[0].childNodes[0].nodeValue + "</td></tr>";
            }
            document.getElementById("id").innerHTML = table;
        }
    </script>
</head>
<body>
    <center>
        <!--
            AI-ASSISTED: Button now has id="toggleBtn" so JavaScript can update its text.
            onclick changed from loadXMLDoc() to toggleEmployeeData().
            Initial text set to "Get Employee Data" per AI suggestion.
        -->
        <button type="button" id="toggleBtn" class="button" onclick="toggleEmployeeData()">
            Get Employee Data
        </button>
    </center>
    <br><br>
    <table id="id"></table>
</body>
</html>
